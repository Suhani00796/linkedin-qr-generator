<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Certificate</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2em;
        }
        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }
        #display {
            margin-top: 30px;
        }
        #display img {
            max-width: 100%;
            height: auto;
            border: 3px solid #667eea;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        .verified {
            color: #28a745;
            font-size: 1.2em;
            margin: 20px 0;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Certificate Verification</h1>
        <div class="badge">✅ Official Verification System</div>
        <div id="display">Loading...</div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const certId = urlParams.get('id');
        if(certId) {
            fetch(`http://localhost:3000/uploads/${certId}`)
                .then(res => {
                    if(res.ok) {
                        document.getElementById('display').innerHTML = `
                            <p class="verified">✅ This certificate is authentic and verified!</p>
                            <img src="http://localhost:3000/uploads/${certId}" alt="Certificate">
                        `;
                    }
                })
                .catch(() => {
                    document.getElementById('display').innerHTML = '<p style="color: red;">❌ Certificate not found</p>';
                });
        } else {
            document.getElementById('display').innerHTML = '<p style="color: red;">❌ Invalid verification link</p>';
        }
    </script>
</body>
</html>
