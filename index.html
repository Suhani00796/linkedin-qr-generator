<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link rel="icon" type="image/svg+xml" id="favicon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 550px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 0.95em;
            opacity: 0.9;
        }

        .content {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="file"],
        input[type="color"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.95em;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        input[type="text"]:focus,
        input[type="file"]:focus,
        input[type="color"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="color"] {
            height: 50px;
            padding: 5px;
            cursor: pointer;
        }

        input[type="file"] {
            padding: 10px;
            cursor: pointer;
        }

        input[type="file"]::file-selector-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-right: 10px;
        }

        .color-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .color-item {
            text-align: center;
        }

        .color-item label {
            margin-bottom: 8px;
        }

        .paste-area {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
            margin-bottom: 10px;
        }

        .paste-area:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }

        .paste-area.dragover {
            background: #e8ebff;
            border-color: #764ba2;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #result {
            margin-top: 30px;
        }

        .result-box {
            background: #f8f9ff;
            padding: 25px;
            border-radius: 15px;
            border: 2px solid #e0e0ff;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-box p {
            color: #555;
            margin-bottom: 15px;
            font-size: 0.95em;
        }

        .result-box img {
            max-width: 280px;
            height: auto;
            border-radius: 10px;
            margin: 20px 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .result-box a {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            word-break: break-all;
            font-size: 0.85em;
        }

        .result-box a:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px 15px;
            border-radius: 8px;
            border-left: 4px solid #c33;
            margin-bottom: 15px;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 12px 15px;
            border-radius: 8px;
            border-left: 4px solid #3c3;
            margin-bottom: 15px;
        }

        .loading {
            display: inline-block;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hint {
            font-size: 0.85em;
            color: #999;
            margin-top: 5px;
        }

        .preview-image {
            max-width: 100%;
            max-height: 100px;
            border-radius: 8px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 QR Generator</h1>
            <p>Create shareable QR codes for your certificates</p>
        </div>

        <div class="content">
            <div class="form-group">
                <label for="domain">Domain Name</label>
                <input type="text" id="domain" placeholder="e.g. www.google.com, campusweb.com">
                <div class="hint">Enter domain name with or without www (e.g., www.google.com or google.com)</div>
            </div>

            <div class="form-group">
                <label>Favicon Color</label>
                <div class="color-group">
                    <div class="color-item">
                        <label for="faviconBg">Background</label>
                        <input type="color" id="faviconBg" value="#2563eb">
                    </div>
                    <div class="color-item">
                        <label for="faviconColor">Pattern</label>
                        <input type="color" id="faviconColor" value="#ffffff">
                    </div>
                </div>
                <div class="hint">Customize favicon colors for your brand</div>
            </div>

            <div class="form-group">
                <label>Upload Certificate Image</label>
                <div class="paste-area" id="pasteArea">
                    <p>📸 Click or paste screenshot here</p>
                    <small>You can paste from clipboard (Ctrl+V / Cmd+V)</small>
                </div>
                <input type="file" id="certFile" accept="image/*" style="display:none;">
                <div id="preview"></div>
            </div>

            <button onclick="generate()" id="generateBtn">Generate QR Code</button>

            <div id="result"></div>
        </div>
    </div>

    <script>
        // Set favicon dynamically
        function updateFavicon() {
            const bg = document.getElementById('faviconBg').value;
            const color = document.getElementById('faviconColor').value;
            const svg = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='${encodeURIComponent(bg)}'/><rect x='10' y='10' width='30' height='30' fill='${encodeURIComponent(color)}'/><rect x='60' y='10' width='30' height='30' fill='${encodeURIComponent(color)}'/><rect x='10' y='60' width='30' height='30' fill='${encodeURIComponent(color)}'/><rect x='35' y='35' width='30' height='30' fill='${encodeURIComponent(color)}' opacity='0.5'/></svg>`;
            document.getElementById('favicon').href = svg;
        }

        document.getElementById('faviconBg').addEventListener('change', updateFavicon);
        document.getElementById('faviconColor').addEventListener('change', updateFavicon);

        // Paste area functionality
        const pasteArea = document.getElementById('pasteArea');
        const certFile = document.getElementById('certFile');

        pasteArea.addEventListener('click', () => certFile.click());

        pasteArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            pasteArea.classList.add('dragover');
        });

        pasteArea.addEventListener('dragleave', () => {
            pasteArea.classList.remove('dragover');
        });

        pasteArea.addEventListener('drop', (e) => {
            e.preventDefault();
            pasteArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                certFile.files = files;
                showPreview(files[0]);
            }
        });

        // Paste from clipboard
        document.addEventListener('paste', (e) => {
            const items = e.clipboardData.items;
            for (let item of items) {
                if (item.type.startsWith('image/')) {
                    const file = item.getAsFile();
                    const dataTransfer = new DataTransfer();
                    dataTransfer.items.add(file);
                    certFile.files = dataTransfer.files;
                    showPreview(file);
                }
            }
        });

        certFile.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                showPreview(e.target.files[0]);
            }
        });

        function showPreview(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('preview').innerHTML = `<img src="${e.target.result}" class="preview-image" alt="Preview">`;
            };
            reader.readAsDataURL(file);
        }

        // Initial favicon setup
        updateFavicon();

        async function generate() {
            const domain = document.getElementById('domain').value.trim();
            const certFile = document.getElementById('certFile');
            const resultDiv = document.getElementById('result');
            const generateBtn = document.getElementById('generateBtn');
            
            if (!domain) {
                resultDiv.innerHTML = '<div class="error">❌ Please enter a domain name</div>';
                return;
            }

            if (!certFile.files[0]) {
                resultDiv.innerHTML = '<div class="error">❌ Please upload an image or certificate</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Generating QR Code...</p></div>';
            generateBtn.disabled = true;

            const formData = new FormData();
            formData.append('certificate', certFile.files[0]);
            formData.append('domain', domain);

            try {
                const response = await fetch('http://localhost:3000/generate-certificate-qr', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Server error');
                }

                const data = await response.json();
                resultDiv.innerHTML = `
                    <div class="result-box">
                        <p class="success">✅ QR Code Generated Successfully!</p>
                        <img src="${data.qrCodeUrl}" alt="Generated QR Code">
                        <p><strong>Verification Link:</strong></p>
                        <a href="${data.verificationUrl}" target="_blank">${data.verificationUrl}</a>
                        <p style="margin-top: 15px; font-size: 0.85em; color: #666;">Share this QR code or link to verify the certificate</p>
                    </div>
                `;
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = '<div class="error">❌ Error: ' + error.message + '</div>';
            } finally {
                generateBtn.disabled = false;
            }
        }

        // Allow Enter key to generate QR
        document.getElementById('domain').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') generate();
        });
    </script>
</body>
</html>
